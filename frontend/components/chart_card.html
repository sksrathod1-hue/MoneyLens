<!-- Template Reference for reports chart layout structure -->
<div class="card report-card">
    <div class="card-header">
        <h3 class="card-title">{chart_title}</h3>
    </div>
    <div class="card-body chart-wrapper">
        <canvas id="{chart_id}"></canvas>
        <div id="{chart_id}Placeholder" class="chart-placeholder text-muted" style="display: none;">
            {placeholder_text}
        </div>
    </div>
</div>
