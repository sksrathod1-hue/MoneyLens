<!-- Navbar Component Fragment -->
<header class="app-navbar">
    <div class="navbar-left">
        <span class="date-today" id="nav-date-display">Today</span>
    </div>
    <div class="navbar-right">
        <!-- User account area -->
        <div class="user-pill">
            <span class="user-avatar">👤</span>
            <span class="username" id="navbar-username">User</span>
            <button class="logout-btn" id="logout-btn" title="Log Out">🔌</button>
        </div>
    </div>
</header>

<script>
    // Show current formatted date on navbar
    (() => {
        const dateDisplay = document.getElementById("nav-date-display");
        if (dateDisplay) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateDisplay.textContent = new Date().toLocaleDateString('en-US', options);
        }
    })();
</script>

    .date-today {
