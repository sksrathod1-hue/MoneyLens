<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyLens - User Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/profile.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="app-body">
    
    <div class="app-wrapper">
        <div id="sidebar-container"></div>
        
        <main class="main-content">
            <div id="navbar-container"></div>
            
            <div class="content-body">
                <div class="page-title-row">
                    <div>
                        <h1>User Profile</h1>
                        <p>Manage your account settings and credentials</p>
                    </div>
                </div>
                
                <div class="profile-layout">
                    <!-- Profile card overview -->
                    <div class="card profile-info-card">
                        <div class="profile-avatar-row">
                            <div class="avatar-large">👤</div>
                            <div>
                                <h2 id="profileUsername">Username</h2>
                                <p class="text-muted" id="profileEmailText">email@domain.com</p>
                            </div>
                        </div>
                        
                        <div class="profile-stats-row">
                            <div class="stat-box">
                                <span class="val" id="profileTxCount">0</span>
                                <span class="lbl">Transactions</span>
                            </div>
                            <div class="stat-box">
                                <span class="val" id="profileBudgetCount">0</span>
                                <span class="lbl">Budgets</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Profile Update Form Card -->
                    <div class="card profile-form-card">
                        <div class="card-header">
                            <h3 class="card-title">Account details</h3>
                        </div>
                        <form id="profileForm" class="card-body">
                            <div class="alert alert-danger" id="profileError" style="display: none;"></div>
                            <div class="alert alert-success" id="profileSuccess" style="display: none;"></div>
                            
                            <div class="form-group">
                                <label for="updateEmail">Email Address</label>
                                <input type="email" id="updateEmail" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div id="footer-container"></div>
        </main>
    </div>
    
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/profile.js"></script>
</body>
</html>
