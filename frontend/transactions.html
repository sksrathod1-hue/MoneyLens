<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyLens - Transactions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="assets/css/style.css">
    <link class="page-css" rel="stylesheet" href="assets/css/transactions.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="app-body">
    
    <div class="app-wrapper">
        <div id="sidebar-container"></div>
        
        <main class="main-content">
            <div id="navbar-container"></div>
            
            <div class="content-body">
                <div class="page-title-row">
                    <div>
                        <h1>Transactions</h1>
                        <p>View, filter, and log income or expense details</p>
                    </div>
                    <button class="btn btn-primary" id="openAddTxBtn">➕ Log Transaction</button>
                </div>
                
                <div class="transactions-layout">
                    <!-- Transactions list table -->
                    <div class="card tx-list-card">
                        <div class="card-header list-filters">
                            <div class="filter-group">
                                <label for="filterType">Type</label>
                                <select id="filterType">
                                    <option value="">All Types</option>
                                    <option value="income">Income</option>
                                    <option value="expense">Expense</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label for="filterCategory">Category</label>
                                <select id="filterCategory">
                                    <option value="">All Categories</option>
                                    <!-- Populated dynamically -->
                                </select>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="tx-table">
                                    <thead>
                                        <tr>
                                            <th>Date</th>
                                            <th>Description</th>
                                            <th>Category</th>
                                            <th>Source</th>
                                            <th>Amount</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="transactions-tbody">
                                        <tr>
                                            <td colspan="6" class="text-center text-muted">Loading transactions...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Sidebar: Add Transaction Panel (sliding or toggled sidebar) -->
                    <div class="add-tx-panel" id="addTxPanel">
                        <div class="panel-header">
                            <h3 id="panelTitle">Log Transaction</h3>
                            <button class="close-btn" id="closePanelBtn">&times;</button>
                        </div>
                        <form id="txForm" class="panel-body">
                            <input type="hidden" id="tx-id">
                            
                            <div class="form-group">
                                <label>Transaction Type</label>
                                <div class="type-toggle-group">
                                    <input type="radio" name="tx_type" id="type-expense" value="expense" checked>
                                    <label for="type-expense">Expense</label>
                                    
                                    <input type="radio" name="tx_type" id="type-income" value="income">
                                    <label for="type-income">Income</label>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="tx-amount">Amount (₹)</label>
                                <input type="number" step="0.01" id="tx-amount" placeholder="0.00" required min="0.01">
                            </div>
                            
                            <div class="form-group">
                                <label for="tx-category">Category</label>
                                <select id="tx-category" required>
                                    <option value="">Select Category</option>
                                    <!-- Populated dynamically -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="tx-date">Date</label>
                                <input type="date" id="tx-date" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="tx-desc">Description</label>
                                <input type="text" id="tx-desc" placeholder="e.g. Starbucks Coffee">
                            </div>
                            
                            <div class="form-group">
                                <label for="tx-receipt">Receipt Image</label>
                                <input type="file" id="tx-receipt" accept="image/*">
                                <div id="receipt-upload-status" class="upload-status"></div>
                                <input type="hidden" id="receipt-path">
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-block">Save Transaction</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div id="footer-container"></div>
        </main>
    </div>
    
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/transactions.js"></script>
</body>
</html>
